# Server
server.port=8082

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/${POSTGRES_APPOINTMENTS_DB}
spring.datasource.username=${POSTGRES_APPOINTMENTS_USER}
spring.datasource.password=${POSTGRES_APPOINTMENTS_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Swagger
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.default-flat-param-object=true

# Application
spring.application.name=appointment-service

# Patient service URL
patient.service.url=http://localhost:8081
