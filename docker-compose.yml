services:
  patients-db:
    image: postgres:16-alpine
    container_name: patients-db
    environment:
      POSTGRES_DB: ${POSTGRES_PATIENTS_DB}
      POSTGRES_USER: ${POSTGRES_PATIENTS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PATIENTS_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - patients_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_PATIENTS_USER} -d ${POSTGRES_PATIENTS_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_PATIENTS_DB: ${POSTGRES_PATIENTS_DB}
      POSTGRES_PATIENTS_USER: ${POSTGRES_PATIENTS_USER}
      POSTGRES_PATIENTS_PASSWORD: ${POSTGRES_PATIENTS_PASSWORD}
    depends_on:
      patients-db:
        condition: service_healthy

  appointments-db:
    image: postgres:16-alpine
    container_name: appointments-db
    environment:
      POSTGRES_DB: ${POSTGRES_APPOINTMENTS_DB}
      POSTGRES_USER: ${POSTGRES_APPOINTMENTS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_APPOINTMENTS_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - appointments_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_APPOINTMENTS_USER} -d ${POSTGRES_APPOINTMENTS_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: appointment-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_APPOINTMENTS_DB: ${POSTGRES_APPOINTMENTS_DB}
      POSTGRES_APPOINTMENTS_USER: ${POSTGRES_APPOINTMENTS_USER}
      POSTGRES_APPOINTMENTS_PASSWORD: ${POSTGRES_APPOINTMENTS_PASSWORD}
    depends_on:
      appointments-db:
        condition: service_healthy
      patient-service:
        condition: service_started

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  patients_data:
  appointments_data:
