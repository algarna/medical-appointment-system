name: patient-service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'patient-service/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'patient-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        working-directory: patient-service
        run: ./mvnw verify
